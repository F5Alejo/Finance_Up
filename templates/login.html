<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Up - Iniciar Sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <!-- Google Fonts para que se vea profesional -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <!-- Logo Superior -->
        <header class="logo-header" style="position: relative; display: flex; justify-content: center; align-items: center; width: 100%; margin-bottom: 2rem;">
            <a href="{{ url_for('inicio') }}" class="back-arrow" style="position: absolute; left: 0; text-decoration: none; color: #0b946d; display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.2rem; padding: 8px 16px; border-radius: 12px; transition: all 0.3s ease; background: rgba(11, 148, 109, 0.05);">
                <span style="font-size: 1.8rem;">&larr;</span> 
                <span>Inicio</span>
            </a>
            <style>
                .back-arrow:hover {
                    background: rgba(11, 148, 109, 0.1) !important;
                    transform: translateX(-5px);
                }
            </style>
            <div class="logo-text">
                <span class="logo-finance">Finance</span><span class="logo-up">Up<sup class="logo-arrow">↑</sup></span>
            </div>
        </header>

        <div class="login-card">
            <!-- Sección Izquierda: Formulario -->
            <section class="form-section">
                <h2>Iniciar sesión</h2>
                <p class="subtitle">Ingresa tus datos para acceder a tu cuenta.</p>

                {% if error %}
                <div style="background:#fee2e2;color:#dc2626;border-radius:8px;padding:10px 14px;font-size:0.88rem;font-weight:600;margin-bottom:14px;border-left:4px solid #dc2626">{{ error }}</div>
                {% endif %}

                <form action="/login" method="POST">
                    <div class="input-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required
                               value="{{ request.form.get('email','') }}">
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="form-options">
                        <label><input type="checkbox"> Recordarme</label>
                        <a href="/recover-account" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-primary">Ingresar</button>
                </form>

                <p class="signup-text">¿No tienes cuenta? <a href="/register">Crear cuenta</a></p>

                <div class="social-login">
                    <p>O ingresar con</p>
                    <div class="social-buttons">
                        <button class="btn-social" onclick="location.href='/simulate/google'"><img src="{{ url_for('static', filename='img/google.png') }}" alt="Gmail"> Gmail</button>
                        <button class="btn-social" onclick="location.href='/simulate/apple'"><img src="{{ url_for('static', filename='img/apple.png') }}" alt="Apple"> Apple</button>
                        <button class="btn-social" onclick="location.href='/simulate/facebook'"><img src="{{ url_for('static', filename='img/facebook.png') }}" alt="Facebook"> Facebook</button>
                    </div>
                </div>
            </section>

            <!-- Sección Derecha: Bienvenida e Imagen -->
            <section class="welcome-section">
                <div class="welcome-content">
                    <h3>Bienvenido a Finance Up</h3>
                    <p>Tu centro de control financiero en un solo lugar.</p>
                    <!-- Aquí iría tu ilustración de las plantas/monedas -->
                    <div class="illustration-placeholder">
                        <img src="{{ url_for('static', filename='img/plantas_login.png') }}" alt="Finanzas">
                    </div>
                </div>
            </section>
        </div>
    </div>
    <script src="{{ url_for('static', filename='login.js') }}"></script>
</body>
</html>

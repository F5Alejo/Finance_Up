<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña - Finance Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='recover.css') }}">
</head>
<body>

    <header class="logo-header">
        <a href="/" class="logo-text">
            <span class="logo-finance">Finance</span>
            <span class="logo-up">Up<span class="logo-arrow"><sup>↑</sup></span></span>
        </a>
    </header>

    <div class="recovery-container recovery-container--step2">
        
        <div class="form-section">
            <div class="header-title">
                <h2>Nueva contraseña</h2>
            </div>
            
            <p class="subtitle">Crea una nueva contraseña segura para tu cuenta.</p>
            
            <div class="password-group">
                <input type="password" class="recovery-input" id="new-password" placeholder="Nueva contraseña" required>
                <button class="toggle-password" data-target="new-password" type="button" title="Mostrar contraseña">
                    <svg class="icon-eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg class="icon-eye-closed d-none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.32"/><path d="M1 1s4 4 11 8 11 8 11 8-4 8-11 8"/><path d="M9.88 9.88A3 3 0 1 0 14.12 14.12"/><path d="M1 1l22 22"/></svg>
                </button>
            </div>

            <div class="password-group">
                <input type="password" class="recovery-input" id="confirm-password" placeholder="Confirmar contraseña" required>
                <button class="toggle-password" data-target="confirm-password" type="button" title="Mostrar contraseña">
                    <svg class="icon-eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg class="icon-eye-closed d-none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.32"/><path d="M1 1s4 4 11 8 11 8 11 8-4 8-11 8"/><path d="M9.88 9.88A3 3 0 1 0 14.12 14.12"/><path d="M1 1l22 22"/></svg>
                </button>
            </div>

            <div class="password-requirements">
                <p>Tu contraseña debe contener al menos:</p>
                <ul>
                    <li>8 caracteres</li>
                    <li>Una letra mayúscula</li>
                    <li>Un número o símbolo especial</li>
                </ul>
            </div>
            
            <div class="button-group">
                <a href="/" class="btn btn-primary" onclick="alert('¡Contraseña actualizada con éxito! Inicia sesión con tus nuevos datos.')">Cambiar contraseña</a>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='new_password.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión en Facebook</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='simulate_facebook.css') }}">
</head>
<body>
    <div class="split-container">
        
        <!-- MITAD IZQUIERDA -->
        <div class="left-half">
            <div class="left-content">
                <div class="text-section">
                    <!-- Usamos el logo que ya tienes en img/ -->
                    <img src="{{ url_for('static', filename='img/facebook.png') }}" class="fb-icon" alt="Facebook">
                    <h1>Explora lo<br>que <span class="text-blue">más te<br>gusta.</span></h1>
                </div>
                <div class="img-section">
                    <!-- Aquí va tu imagen descargada -->
                    <img src="{{ url_for('static', filename='img/bck_facebook.png') }}" class="bck-image" alt="Collage de Facebook">
                </div>
            </div>
        </div>

        <!-- MITAD DERECHA -->
        <div class="right-half">
            <div class="login-box">
                <h2>Iniciar sesión en Facebook</h2>
                
                <input type="text" class="fb-input" placeholder="Correo electrónico o número de celular">
                <input type="password" class="fb-input" placeholder="Contraseña">
                
                <!-- Botón azul que simula el inicio de sesión -->
                <button class="btn-primary" onclick="location.href='/auth/facebook/success'">Iniciar sesión</button>
                
                <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                
                <button class="btn-secondary">Crear cuenta nueva</button>
                
                <div class="meta-logo-container">
                    <!-- Logo de Meta en SVG traído desde internet para que se vea nítido -->
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg" alt="Meta">
                </div>
            </div>
        </div>

    </div>
</body>
</html>
